<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SidewalkShed</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --blue: #3b82f6;
      --green: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      color: #111;
      font-family: "DM Sans", sans-serif;
      background: #ffffff;
    }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      height: 100vh;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 240px;
      height: 100vh;
      padding: 28px 20px;
      font-family: "DM Sans", sans-serif;
      font-weight: 300;
      background: #fff;
      border-right: 0.5px solid rgba(0, 0, 0, 0.12);
      overflow-y: auto;
    }

    .logo {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #111;
    }

    .divider {
      height: 0.5px;
      background: rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
      font-weight: 500;
    }

    .stat {
      font-family: "DM Mono", monospace;
      font-size: 20px;
      font-weight: 400;
      color: #111;
    }

    .status-text {
      font-size: 12px;
      color: #666;
    }

    .sidebar input[type="text"] {
      width: 100%;
      font-size: 12px;
      font-family: "DM Sans", sans-serif;
      padding: 8px 10px;
      border: 0.5px solid rgba(0, 0, 0, 0.15);
      border-radius: 6px;
      background: #f7f7f5;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
    }

    .sidebar input[type="text"]:focus {
      border-color: rgba(0, 0, 0, 0.4);
    }

    .sidebar input[type="text"]::placeholder {
      color: #bbb;
    }

    .route-btn {
      width: 100%;
      padding: 9px;
      font-size: 12px;
      font-family: "DM Sans", sans-serif;
      font-weight: 500;
      letter-spacing: 0.03em;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .route-btn:hover {
      opacity: 0.85;
    }

    .route-btn:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .route-btn.secondary {
      background: #f7f7f5;
      color: #111;
      border: 0.5px solid rgba(0, 0, 0, 0.15);
    }

    .route-btn.secondary.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .pref {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 0.12s;
    }

    .pref:hover {
      background: #f7f7f5;
    }

    .pref.active {
      background: #f7f7f5;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.green {
      background: #22c55e;
    }

    .dot.amber {
      background: #f59e0b;
    }

    .dot.red {
      background: #ef4444;
    }

    .pref-label {
      font-size: 12px;
      color: #111;
    }

    .pref-sub {
      font-size: 10px;
      color: #999;
      margin-left: auto;
    }

    .route-head {
      font-size: 11px;
      font-weight: 500;
      color: #666;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .rdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .rdot.blue {
      background: #3b82f6;
    }

    .rdot.green {
      background: #22c55e;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 16px;
    }

    .metric-lbl {
      font-size: 10px;
      color: #999;
    }

    .metric-val {
      font-size: 13px;
      font-family: "DM Mono", monospace;
      color: #111;
    }

    .footnote {
      font-size: 14px;
      line-height: 1.45;
      color: #6f6f6f;
      margin-top: auto;
      padding-top: 18px;
      font-weight: 300;
    }

    .footnote a {
      color: #0f766e;
      text-decoration: none;
    }

    .footnote a:hover {
      text-decoration: underline;
    }

    .map-wrap {
      height: 100vh;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #map {
      height: 100vh;
      min-height: 100vh;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    .leaflet-container {
      font-family: Arial, sans-serif;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(60svh, 1fr);
        height: auto;
      }

      .sidebar {
        width: auto;
        height: auto;
        border-right: 0;
        border-bottom: 0.5px solid rgba(0, 0, 0, 0.12);
      }

      .map-wrap,
      #map {
        height: 60svh;
        min-height: 60svh;
      }
    }

    @media (max-width: 640px) {
      .sidebar {
        position: sticky;
        top: 0;
        z-index: 1000;
        gap: 16px;
        max-height: min(46svh, 420px);
        padding: 16px 14px 14px;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(12px);
      }

      .logo {
        font-size: 12px;
      }

      .divider {
        display: none;
      }

      .section {
        gap: 6px;
      }

      .summary-section {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: end;
        column-gap: 10px;
      }

      .summary-section .label {
        margin: 0;
      }

      .summary-section .stat {
        justify-self: end;
      }

      .route-section {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      #address-form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px !important;
      }

      #address-form input {
        min-width: 0;
      }

      #address-submit,
      #map-pick-toggle {
        grid-column: 1 / -1;
      }

      .preference-section {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .pref {
        padding: 10px;
      }

      .pref-label {
        font-size: 13px;
      }

      .metrics-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 12px;
      }

      .metrics-section .route-head,
      .metrics-section .metrics {
        margin: 0;
      }

      .footnote {
        margin-top: 0;
        padding-top: 2px;
        font-size: 12px;
      }

      .map-wrap,
      #map {
        height: 54svh;
        min-height: 54svh;
      }
    }

  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="logo">SidewalkShed</div>

      <div class="divider"></div>

      <div class="section summary-section">
        <span class="label">Scaffolds</span>
        <span class="stat" id="total-count">—</span>
      </div>

      <div class="section route-section">
        <span class="label">Route</span>
        <form id="address-form" class="section" style="gap: 6px;">
          <input type="text" id="point-a-input" name="point-a" placeholder="From" autocomplete="street-address">
          <input type="text" id="point-b-input" name="point-b" placeholder="To" autocomplete="street-address">
          <button class="route-btn" id="address-submit" type="submit">Find route</button>
        </form>
        <button class="route-btn secondary" id="map-pick-toggle" type="button">Use map clicks</button>
        <div class="status-text" id="route-status">Enter both route addresses to begin.</div>
        <div id="point-a" hidden>Not set</div>
        <div id="point-b" hidden>Not set</div>
      </div>

      <div class="section preference-section">
        <span class="label">Preference</span>
        <button class="pref detour-button active" data-mode="minimal" type="button">
          <span class="dot green"></span>
          <span class="pref-label">Minimal detour</span>
          <span class="pref-sub">+10%</span>
        </button>
        <button class="pref detour-button" data-mode="moderate" type="button">
          <span class="dot amber"></span>
          <span class="pref-label">A bit wetter</span>
          <span class="pref-sub">+30%</span>
        </button>
        <button class="pref detour-button" data-mode="max" type="button">
          <span class="dot red"></span>
          <span class="pref-label">Keep me dry</span>
          <span class="pref-sub">+75%</span>
        </button>
      </div>

      <div class="divider"></div>

      <div class="section metrics-section">
        <div class="route-head"><span class="rdot blue"></span>Shortest</div>
        <div class="metrics">
          <div>
            <div class="metric-lbl">Distance</div>
            <div class="metric-val" id="shortest-distance">—</div>
          </div>
          <div>
            <div class="metric-lbl">Scaffolds</div>
            <div class="metric-val" id="shortest-count">—</div>
          </div>
        </div>

        <div class="route-head"><span class="rdot green"></span>Scaffold</div>
        <div class="metrics">
          <div>
            <div class="metric-lbl">Distance</div>
            <div class="metric-val" id="scaffold-distance">—</div>
          </div>
          <div>
            <div class="metric-lbl">Scaffolds</div>
            <div class="metric-val" id="scaffold-count">—</div>
          </div>
        </div>
        <div id="pct-longer" hidden>—</div>
      </div>

      <div class="footnote">
        Built by <a href="https://github.com/l-matthew07" target="_blank" rel="noreferrer">l-matthew07</a>.<br>
        View the project on <a href="https://github.com/l-matthew07/sidewalk-sheds" target="_blank"
          rel="noreferrer">GitHub</a>.
      </div>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const map = L.map("map", {
      center: [40.7128, -74.0060],
      zoom: 11,
      preferCanvas: true
    });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const scaffoldLayer = L.layerGroup().addTo(map);
    const routeLayer = L.layerGroup().addTo(map);

    const totalCountEl = document.getElementById("total-count");
    const pointAEl = document.getElementById("point-a");
    const pointBEl = document.getElementById("point-b");
    const pointAInputEl = document.getElementById("point-a-input");
    const pointBInputEl = document.getElementById("point-b-input");
    const addressFormEl = document.getElementById("address-form");
    const addressSubmitEl = document.getElementById("address-submit");
    const mapPickToggleEl = document.getElementById("map-pick-toggle");
    const detourButtons = Array.from(document.querySelectorAll(".detour-button"));
    const routeStatusEl = document.getElementById("route-status");
    const shortestDistanceEl = document.getElementById("shortest-distance");
    const shortestCountEl = document.getElementById("shortest-count");
    const scaffoldDistanceEl = document.getElementById("scaffold-distance");
    const scaffoldCountEl = document.getElementById("scaffold-count");
    const pctLongerEl = document.getElementById("pct-longer");

    const defaultMarkerStyle = {
      radius: 3,
      fillColor: "#c26d13",
      color: "#8a4b07",
      weight: 1,
      opacity: 0.65,
      fillOpacity: 0.6
    };

    let pointA = null;
    let pointB = null;
    let pointALabel = null;
    let pointBLabel = null;
    let pointAMarker = null;
    let pointBMarker = null;
    let shortestRouteLayer = null;
    let scaffoldRouteLayer = null;
    let routeRequestSerial = 0;
    let selectedDetourMode = "minimal";
    let mapPickMode = false;

    function formatPoint(label, latlng) {
      if (label) {
        return label;
      }
      if (!latlng) {
        return "Not set";
      }
      return `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
    }

    function formatDistance(distanceMeters) {
      if (distanceMeters === null || distanceMeters === undefined) {
        return "-";
      }
      return `${(distanceMeters / 1000).toFixed(2)} km`;
    }

    function formatPercent(value) {
      if (value === null || value === undefined) {
        return "-";
      }
      return `${value.toFixed(1)}%`;
    }

    function updatePointLabels() {
      pointAEl.textContent = formatPoint(pointALabel, pointA);
      pointBEl.textContent = formatPoint(pointBLabel, pointB);
    }

    function setMapPickMode(enabled) {
      mapPickMode = enabled;
      mapPickToggleEl.classList.toggle("active", enabled);
      mapPickToggleEl.textContent = enabled ? "Map clicks on" : "Use map clicks";
      map.getContainer().style.cursor = enabled ? "crosshair" : "";

      if (enabled) {
        if (!pointA) {
          routeStatusEl.textContent = "Map click mode: click once for point A.";
        } else if (!pointB) {
          routeStatusEl.textContent = "Map click mode: click again for point B.";
        } else {
          routeStatusEl.textContent = "Map click mode: click again to reset point A.";
        }
      } else if (!pointA || !pointB) {
        routeStatusEl.textContent = "Enter both route addresses to begin.";
      }
    }

    function setPointFromMap(slot, latlng) {
      const coords = { lat: latlng.lat, lng: latlng.lng };
      const label = `Map pick ${slot.toUpperCase()}`;
      const textValue = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;

      if (slot === "a") {
        pointA = coords;
        pointALabel = label;
        pointAInputEl.value = textValue;
      } else {
        pointB = coords;
        pointBLabel = label;
        pointBInputEl.value = textValue;
      }
    }

    function resetPointB() {
      pointB = null;
      pointBLabel = null;
      pointBInputEl.value = "";
    }

    function addEndpointMarker(latlng, label, color) {
      return L.circleMarker(latlng, {
        radius: 8,
        fillColor: color,
        color: "#ffffff",
        weight: 2,
        opacity: 1,
        fillOpacity: 1
      }).bindTooltip(label, { permanent: true, direction: "top", offset: [0, -10] }).addTo(routeLayer);
    }

    function redrawEndpoints() {
      routeLayer.clearLayers();
      pointAMarker = null;
      pointBMarker = null;

      if (pointA) {
        pointAMarker = addEndpointMarker(pointA, "You", "#047857");
      }
      if (pointB) {
        pointBMarker = addEndpointMarker(pointB, "Dest", "#7c3aed");
      }
    }

    function clearRoutes() {
      if (shortestRouteLayer) {
        map.removeLayer(shortestRouteLayer);
        shortestRouteLayer = null;
      }
      if (scaffoldRouteLayer) {
        map.removeLayer(scaffoldRouteLayer);
        scaffoldRouteLayer = null;
      }
    }

    function resetRouteStats() {
      shortestDistanceEl.textContent = "-";
      shortestCountEl.textContent = "-";
      scaffoldDistanceEl.textContent = "-";
      scaffoldCountEl.textContent = "-";
      pctLongerEl.textContent = "-";
    }

    function setButtonState(activeMode) {
      detourButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === activeMode);
      });
    }

    async function geocodeAddress(address) {
      const response = await fetch("/api/geocode", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ address })
      });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "Address lookup failed.");
      }
      return payload;
    }

    async function submitAddresses() {
      const addressA = pointAInputEl.value.trim();
      const addressB = pointBInputEl.value.trim();
      if (!addressA || !addressB) {
        routeStatusEl.textContent = "Enter both route addresses to begin.";
        return;
      }

      addressSubmitEl.disabled = true;
      routeStatusEl.textContent = "Looking up both addresses...";

      try {
        const [resolvedA, resolvedB] = await Promise.all([
          geocodeAddress(addressA),
          geocodeAddress(addressB)
        ]);

        pointA = { lat: resolvedA.lat, lng: resolvedA.lng };
        pointB = { lat: resolvedB.lat, lng: resolvedB.lng };
        pointALabel = resolvedA.address;
        pointBLabel = resolvedB.address;

        updatePointLabels();
        redrawEndpoints();
        clearRoutes();
        resetRouteStats();
        await requestRoutes();
      } finally {
        addressSubmitEl.disabled = false;
      }
    }

    async function handleMapPick(latlng) {
      if (!pointA) {
        setPointFromMap("a", latlng);
        resetPointB();
        clearRoutes();
        resetRouteStats();
        updatePointLabels();
        redrawEndpoints();
        routeStatusEl.textContent = "Map click mode: click again for point B.";
        return;
      }

      if (!pointB) {
        setPointFromMap("b", latlng);
        updatePointLabels();
        redrawEndpoints();
        clearRoutes();
        resetRouteStats();
        await requestRoutes();
        return;
      }

      setPointFromMap("a", latlng);
      resetPointB();
      clearRoutes();
      resetRouteStats();
      updatePointLabels();
      redrawEndpoints();
      routeStatusEl.textContent = "Point A reset. Click again for point B.";
    }

    function scaffoldPopupContent(scaffold) {
      return `
          <strong>${scaffold.address || "Unknown address"}</strong><br>
          Permit start: ${scaffold.permit_start || "Unknown"}<br>
          Permit end: ${scaffold.permit_end || "Unknown"}
        `;
    }

    function drawRoute(feature, color, dashArray) {
      return L.geoJSON(feature, {
        style: {
          color,
          weight: 5,
          opacity: 0.8,
          dashArray
        }
      }).addTo(map);
    }

    function fitRouteBounds() {
      const layers = [shortestRouteLayer, scaffoldRouteLayer].filter(Boolean);
      if (!layers.length) {
        return;
      }
      const bounds = L.featureGroup(layers).getBounds();
      if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.1));
      }
    }

    function updateStats(payload) {
      shortestDistanceEl.textContent = formatDistance(payload.shortest.distance_m);
      shortestCountEl.textContent = payload.shortest.scaffolds_covered ?? "-";

      if (payload.scaffold_route.geojson) {
        scaffoldDistanceEl.textContent = formatDistance(payload.scaffold_route.distance_m);
        scaffoldCountEl.textContent = payload.scaffold_route.scaffolds_covered;
        const pctLonger = ((payload.scaffold_route.distance_m - payload.shortest.distance_m) / payload.shortest.distance_m) * 100;
        pctLongerEl.textContent = formatPercent(Math.max(0, pctLonger));
      } else {
        scaffoldDistanceEl.textContent = "-";
        scaffoldCountEl.textContent = "No viable detour";
        pctLongerEl.textContent = "-";
      }
    }

    async function requestRoutes() {
      if (!pointA || !pointB) {
        return;
      }

      const currentRequest = ++routeRequestSerial;
      routeStatusEl.textContent = "Computing walking routes...";

      try {
        const response = await fetch("/api/route", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            start: { lat: pointA.lat, lng: pointA.lng },
            end: { lat: pointB.lat, lng: pointB.lng },
            detour_mode: selectedDetourMode
          })
        });

        const payload = await response.json();
        if (currentRequest !== routeRequestSerial) {
          return;
        }
        if (!response.ok) {
          throw new Error(payload.error || "Route request failed.");
        }

        clearRoutes();
        redrawEndpoints();

        shortestRouteLayer = drawRoute(payload.shortest.geojson, "#2563eb", null);
        if (payload.scaffold_route.geojson) {
          scaffoldRouteLayer = drawRoute(payload.scaffold_route.geojson, "#16a34a", "10 8");
        }

        updateStats(payload);
        fitRouteBounds();

        if (payload.scaffold_route.geojson) {
          routeStatusEl.textContent = `${payload.scaffold_route.waypoints.length} snapped scaffold waypoint(s) used.`;
        } else {
          routeStatusEl.textContent = "No scaffold detour fit within the current mode.";
        }
      } catch (error) {
        if (currentRequest !== routeRequestSerial) {
          return;
        }
        clearRoutes();
        redrawEndpoints();
        resetRouteStats();
        routeStatusEl.textContent = error.message;
        console.error("Failed to compute routes", error);
      }
    }

    async function loadScaffolds() {
      const response = await fetch("/api/scaffolds");
      const rows = await response.json();
      totalCountEl.textContent = String(rows.length);

      for (const row of rows) {
        L.circleMarker([row.lat, row.lng], defaultMarkerStyle)
          .bindPopup(scaffoldPopupContent(row))
          .addTo(scaffoldLayer);
      }
    }

    detourButtons.forEach((button) => {
      button.addEventListener("click", () => {
        selectedDetourMode = button.dataset.mode;
        setButtonState(selectedDetourMode);
        if (pointA && pointB) {
          requestRoutes();
        }
      });
    });

    mapPickToggleEl.addEventListener("click", () => {
      setMapPickMode(!mapPickMode);
    });

    map.on("click", (event) => {
      if (!mapPickMode) {
        return;
      }

      handleMapPick(event.latlng).catch((error) => {
        clearRoutes();
        redrawEndpoints();
        resetRouteStats();
        routeStatusEl.textContent = error.message;
        console.error("Failed to set route from map clicks", error);
      });
    });

    addressFormEl.addEventListener("submit", (event) => {
      event.preventDefault();
      submitAddresses().catch((error) => {
        clearRoutes();
        redrawEndpoints();
        resetRouteStats();
        routeStatusEl.textContent = error.message;
        console.error("Failed to geocode addresses", error);
      });
    });

    loadScaffolds().catch((error) => {
      totalCountEl.textContent = "Error";
      routeStatusEl.textContent = "Failed to initialize app data.";
      console.error("Initialization failed", error);
    });

    window.addEventListener("load", () => {
      map.invalidateSize();
    });

    window.addEventListener("resize", () => {
      map.invalidateSize();
    });
  </script>
</body>
